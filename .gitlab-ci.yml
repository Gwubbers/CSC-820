variables:
  GIT_SSL_NO_VERIFY: "true"

stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - echo "Tests passed"

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.hl1\":{\"auth\":\"$(echo -n $CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD | base64)\"}}}" > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      --destination $CI_REGISTRY_IMAGE:latest
      --skip-tls-verify
  only:
    - main

deploy:
  stage: deploy
  image: alpine/git
  script:
    - git clone https://root:$GITLAB_TOKEN@gitlab.hl1/root/order-api-config.git
    - cd order-api-config
    - sed -i "s|registry.hl1/root/order-api:.*|registry.hl1/root/order-api:$CI_COMMIT_SHORT_SHA|g" k8s/deployment.yaml
    - git config user.email "ci@gitlab.hl1"
    - git config user.name "GitLab CI"
    - git add k8s/deployment.yaml
    - git commit -m "Update image to $CI_COMMIT_SHORT_SHA"
    - git push
  only:
    - main
