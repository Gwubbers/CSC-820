variables:
  GIT_SSL_NO_VERIFY: "true"
  CI_CLONE_URL: "http://gitlab-webservice-default.gitlab.svc.cluster.local:8080"

stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: node:20-alpine
  variables:
    GIT_SSL_NO_VERIFY: "true"
  script:
    - npm ci
    - echo "Tests passed"

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    GIT_SSL_NO_VERIFY: "true"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  only:
    - main

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  variables:
    GIT_SSL_NO_VERIFY: "true"
  before_script:
    - kubectl config set-cluster hl1 --server=$KUBE_URL --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab --token=$KUBE_TOKEN
    - kubectl config set-context hl1 --cluster=hl1 --user=gitlab
    - kubectl config use-context hl1
  script:
    - kubectl set image deployment/order-api order-api=$IMAGE_NAME:$IMAGE_TAG
    - kubectl rollout status deployment/order-api
  only:
    - main
