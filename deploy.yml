---
- name: Deploy Node.js Order Management API with PostgreSQL
  hosts: all
  become: true

  vars:
    app_name: order-api
    app_user: nodeapp
    app_dir: /opt/{{ app_name }}
    app_repo: https://github.com/Gwubbers/CSC-820.git
    app_port: 3000
    node_version: "20"

    db_name: ordersdb
    db_user: orderuser
    db_password: "ChangeMe_StrongPass123!"
    db_host: localhost

  tasks:

    # System prep 
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - python3-pip
          - python3-psycopg2
          - acl
          - psmisc
        state: present

    # Node.js (NodeSource repo) 
    - name: Add NodeSource GPG key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    # PostgreSQL 
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present

    - name: Ensure PostgreSQL is running and enabled
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create application database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        state: present

    - name: Create database user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present

    - name: Grant privileges on database to user
      become_user: postgres
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        type: database
        privs: ALL
        state: present

    # Application user 
    - name: Create dedicated app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash
        home: "{{ app_dir }}"
        create_home: no

    # Kill stale processes from previous runs
    - name: Kill any stale processes bound to the app port
      shell: |
        fuser -k {{ app_port }}/tcp 2>/dev/null || true
        sleep 2
      changed_when: false
      ignore_errors: yes

    # Clone app code 
    - name: Clone or update application repository
      shell: |
        git config --global --add safe.directory {{ app_dir }}
        if [ -d "{{ app_dir }}/.git" ]; then
          cd "{{ app_dir }}" && git fetch origin && git reset --hard origin/main
        else
          rm -rf "{{ app_dir }}"
          git clone {{ app_repo }} "{{ app_dir }}"
        fi
      register: clone_result
      changed_when: "'Already up to date' not in clone_result.stdout"

    - name: Set ownership of app directory
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    - name: Ensure app directory itself is writable by app user
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0775'

    - name: Write environment file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
        content: |
          PORT={{ app_port }}
          DATABASE_URL=postgres://{{ db_user }}:{{ db_password }}@{{ db_host }}:5432/{{ db_name }}
          NODE_ENV=production

    # Install npm dependencies
    - name: Install npm dependencies
      become_user: "{{ app_user }}"
      community.general.npm:
        path: "{{ app_dir }}"
        production: yes

    # PM2 
    - name: Install PM2 globally
      community.general.npm:
        name: pm2
        global: yes
        state: present

    - name: Stop and delete any existing PM2 process for this app
      become_user: "{{ app_user }}"
      shell: pm2 delete {{ app_name }} 2>/dev/null || true
      environment:
        PATH: "/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"
      changed_when: false

    - name: Start application via PM2
      become_user: "{{ app_user }}"
      shell: pm2 start app.js --name {{ app_name }}
      args:
        chdir: "{{ app_dir }}"
      environment:
        PATH: "/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"

    - name: Save PM2 process list
      become_user: "{{ app_user }}"
      shell: pm2 save
      environment:
        PATH: "/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}"

    # Verification 
    - name: Wait for application to respond
      uri:
        url: "http://localhost:{{ app_port }}/orders"
        status_code: 200
      retries: 10
      delay: 3
      register: health_check
      until: health_check.status == 200

    - name: Print deployment summary
      debug:
        msg:
          - "Deployment complete"
          - "App: {{ app_name }}"
          - "URL: http://{{ ansible_default_ipv4.address }}:{{ app_port }}/orders"
          - "DB:  {{ db_name }} (user: {{ db_user }})"